name: Deploy Laravel to cPanel via FTP

on:
  push:
    branches:
      - main # Ubah ke 'develop' jika Anda deploy dari branch develop

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4
        
      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Sesuaikan dengan versi PHP Laravel
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, pdo
          
      - name: 📦 Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader
        
      - name: 📦 Install NPM Dependencies
        run: npm install
        
      - name: 🏗️ Build Assets (Vite / Mix)
        run: npm run build
        
      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/ # Sesuaikan folder tujuan di cPanel (akhiri dengan '/')
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env.example
            .github/**
